name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-telegram

services:
  oxide_agent:
    build:
      args:
        CARGO_FEATURES: oxide-agent-telegram-bot/profile-embedded-opencode-local,oxide-agent-core/tool-crw,oxide-agent-sandboxd/profile-full
    environment:
      OXIDE_CRW_ENABLED: ${OXIDE_CRW_ENABLED:-true}
      OXIDE_CRW_BASE_URL: ${OXIDE_CRW_BASE_URL:-http://127.0.0.1:3000}
      OXIDE_CRW_API_TOKEN: ${OXIDE_CRW_API_TOKEN:-}
    depends_on:
      crw:
        condition: service_healthy

  crw:
    image: ${OXIDE_CRW_IMAGE:-ghcr.io/us/crw}
    container_name: crw
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:${OXIDE_CRW_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || curl -fsS http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
