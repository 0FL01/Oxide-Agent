name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-web

x-oxide-web-build: &oxide_web_build
  context: .
  dockerfile: docker/Dockerfile.app
  args:
    CARGO_FEATURES: oxide-agent-transport-web/profile-web-embedded-opencode-local,oxide-agent-sandboxd/profile-full
    PACKAGES: oxide-agent-transport-web oxide-agent-sandboxd
    BINARIES: oxide-agent-web-console oxide-agent-sandboxd
    ENTRYPOINT_BINARY: oxide-agent-web-console
    RUNTIME_APT_PACKAGES: ""
    BUILD_WEB_UI: "true"

services:
  sandbox_image:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.dev
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    command: ["true"]
    restart: "no"
    environment:
      - TZ=Europe/Moscow

  oxide_web:
    build: *oxide_web_build
    image: oxide-agent-web:latest
    container_name: oxide_agent_web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - OXIDE_WEB_ADDR=${OXIDE_WEB_ADDR:-127.0.0.1:3010}
      - OXIDE_WEB_STATIC_DIR=/app/web
      - OXIDE_WEB_REQUIRE_STATIC_ASSETS=true
      - OXIDE_WEB_ENABLED=true
      - OXIDE_WEB_ALLOW_IN_MEMORY_STORE=${OXIDE_WEB_ALLOW_IN_MEMORY_STORE:-true}
      - OXIDE_WEB_REGISTRATION_ENABLED=${OXIDE_WEB_REGISTRATION_ENABLED:-true}
      - OXIDE_WEB_BOOTSTRAP_TOKEN=${OXIDE_WEB_BOOTSTRAP_TOKEN:-}
      - OXIDE_WEB_COOKIE_SECURE=${OXIDE_WEB_COOKIE_SECURE:-false}
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOX_BACKEND=broker
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
      - DUCKDUCKGO_ENABLED=true
      - DUCKDUCKGO_MIN_DELAY_MS=2500
      - DUCKDUCKGO_JITTER_MS=1500
      - SEARXNG_ENABLED=true
      - SEARXNG_URL=http://127.0.0.1:8081
      - BROWSER_USE_URL=${BROWSER_USE_URL:-http://127.0.0.1:8002}
      - BROWSER_USE_TIMEOUT_SECS=${BROWSER_USE_TIMEOUT_SECS:-300}
      - BROWSER_USE_MAX_CONCURRENT=${BROWSER_USE_MAX_CONCURRENT:-2}
      - BROWSER_USE_MODEL_ID=${BROWSER_USE_MODEL_ID:-mimo-v2.5}
      - BROWSER_USE_MODEL_PROVIDER=${BROWSER_USE_MODEL_PROVIDER:-opencode-go}
      - TZ=Europe/Moscow
      - RUST_LOG=oxide_agent_core=info,oxide_agent_transport_web=info,oxide_agent_runtime=info,zai_rs=warn,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - DEBUG_MODE=false
    volumes:
      - ./config:/app/config
      - sandboxd-run:/run/sandboxd
    network_mode: host
    depends_on:
      sandboxd:
        condition: service_healthy
      searxng:
        condition: service_healthy
      browser_use:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  browser_use:
    build:
      context: services/browser_use_bridge
      dockerfile: Dockerfile
    image: oxide-agent-browser-use:latest
    container_name: oxide_agent_browser_use
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - BROWSER_USE_BRIDGE_DATA_DIR=/data
      - BROWSER_USE_BRIDGE_MAX_CONCURRENT_SESSIONS=${BROWSER_USE_BRIDGE_MAX_CONCURRENT_SESSIONS:-2}
      - BROWSER_USE_BRIDGE_MAX_PROFILES_PER_SCOPE=${BROWSER_USE_BRIDGE_MAX_PROFILES_PER_SCOPE:-3}
      - BROWSER_USE_BRIDGE_PROFILE_IDLE_TTL_SECS=${BROWSER_USE_BRIDGE_PROFILE_IDLE_TTL_SECS:-604800}
      - BROWSER_USE_BRIDGE_BROWSER_READY_RETRIES=${BROWSER_USE_BRIDGE_BROWSER_READY_RETRIES:-2}
      - BROWSER_USE_BRIDGE_BROWSER_READY_RETRY_DELAY_MS=${BROWSER_USE_BRIDGE_BROWSER_READY_RETRY_DELAY_MS:-750}
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - browser-use-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  sandboxd:
    build: *oxide_web_build
    image: oxide-agent-web:latest
    container_name: oxide_agent_sandboxd
    restart: unless-stopped
    user: "0"
    command: ["./oxide-agent-sandboxd"]
    environment:
      - RUST_LOG=oxide_agent_core=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
      - STACK_LOGS_PROJECT=${COMPOSE_PROJECT_NAME:-oxide-agent}-web
    depends_on:
      sandbox_image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-run:/run/sandboxd
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sandboxd/sandboxd.sock"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  searxng:
    image: searxng/searxng:2026.5.31-300695de5
    container_name: searxng
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - SEARXNG_BASE_URL=http://127.0.0.1:8081/
      - GRANIAN_HOST=0.0.0.0
      - GRANIAN_PORT=8080
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  sandboxd-run:
  browser-use-data:
