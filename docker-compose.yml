services:
  sandbox_image:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.sandbox
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    command: ["true"]
    restart: "no"
    environment:
      - TZ=Europe/Moscow

  oxide_agent:
    build:
      context: .
    image: oxide-agent:latest
    container_name: oxide_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BROWSER_USE_ENABLED=true
      - BROWSER_USE_URL=http://127.0.0.1:8002
      - CRAWL4AI_URL=http://127.0.0.1:11235
      - SEARXNG_ENABLED=true
      - SEARXNG_URL=http://127.0.0.1:8081
      - TZ=Europe/Moscow
      - RUST_LOG=oxide_agent=info,zai_rs=warn,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOX_BACKEND=broker
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
    volumes:
      - ./config:/app/config
      - sandboxd-run:/run/sandboxd
    network_mode: host
    depends_on:
      sandboxd:
        condition: service_healthy
      browser_use:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      searxng:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  sandboxd:
    build:
      context: .
    image: oxide-agent:latest
    container_name: oxide_agent_sandboxd
    restart: unless-stopped
    user: "0"
    command: ["./oxide-agent-sandboxd"]
    environment:
      - RUST_LOG=oxide_agent_core=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
    depends_on:
      sandbox_image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-run:/run/sandboxd
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sandboxd/sandboxd.sock"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crawl4ai:
    image: unclecode/crawl4ai:0.8.5
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: '2gb'
    ports:
      - "127.0.0.1:11235:11235"
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  browser_use:
    build:
      context: ./services/browser_use_bridge
    image: oxide-agent-browser-use:latest
    container_name: browser_use
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - BROWSER_USE_BRIDGE_HOST=0.0.0.0
      - BROWSER_USE_BRIDGE_PORT=8000
      - BROWSER_USE_BRIDGE_DATA_DIR=/data
      - BROWSER_USE_BRIDGE_MAX_PROFILES_PER_SCOPE=${BROWSER_USE_BRIDGE_MAX_PROFILES_PER_SCOPE:-3}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    shm_size: '2gb'
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - browser-use-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  searxng:
    image: searxng/searxng:2026.3.24-054174a19
    container_name: searxng
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - SEARXNG_BASE_URL=http://127.0.0.1:8081/
      - GRANIAN_HOST=0.0.0.0
      - GRANIAN_PORT=8080
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  browser-use-data:
  sandboxd-run:
