  searxng:
    image: searxng/searxng:2026.3.24-054174a19
    container_name: searxng
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - SEARXNG_BASE_URL=http://127.0.0.1:8081/
      - GRANIAN_HOST=0.0.0.0
      - GRANIAN_PORT=8080
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

