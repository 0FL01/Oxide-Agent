name: ${COMPOSE_PROJECT_NAME:-oxide-agent}

x-oxide-app-build: &oxide_app_build
  context: .
  dockerfile: docker/Dockerfile.app
  args:
    CARGO_FEATURES: oxide-agent-telegram-bot/profile-full,oxide-agent-sandboxd/profile-full
    PACKAGES: oxide-agent-telegram-bot oxide-agent-sandboxd
    BINARIES: oxide-agent-telegram-bot oxide-agent-sandboxd
    MCP_BINARIES: ssh-mcp jira-mcp mattermost-mcp
    ENTRYPOINT_BINARY: oxide-agent-telegram-bot
    RUNTIME_APT_PACKAGES: openssh-client

x-browser-sidecar-build: &browser_sidecar_build
  context: .
  dockerfile: docker/Dockerfile.chrome-agent-sidecar

services:
  sandbox_image:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.dev
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    command: ["true"]
    restart: "no"
    environment:
      - TZ=Europe/Moscow

  oxide_agent:
    build: *oxide_app_build
    image: oxide-agent:latest
    container_name: oxide_agent
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - OXIDE_CRW_ENABLED=true
      - OXIDE_CRW_BASE_URL=http://127.0.0.1:3000
      - OXIDE_CRW_API_TOKEN=${OXIDE_CRW_API_TOKEN:-}
      - RUST_LOG=oxide_agent=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOX_BACKEND=broker
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
      - BROWSER_AGENT_ENABLED=${BROWSER_AGENT_ENABLED:-false}
      - BROWSER_AGENT_SIDECAR_BASE_URL=http://127.0.0.1:${BROWSER_AGENT_SIDECAR_PORT:-8787}
      - BROWSER_AGENT_SIDECAR_WS_URL=ws://127.0.0.1:${BROWSER_AGENT_SIDECAR_PORT:-8787}
      - BROWSER_AGENT_SIDECAR_TOKEN=${BROWSER_AGENT_SIDECAR_TOKEN:-}
      - BROWSER_AGENT_MIMO_PROVIDER=${BROWSER_AGENT_MIMO_PROVIDER:-opencode-go}
      - BROWSER_AGENT_MIMO_MODEL=${BROWSER_AGENT_MIMO_MODEL:-mimo-v2.5}
    volumes:
      - ./config:/app/config
      - sandboxd-run:/run/sandboxd
    network_mode: host
    depends_on:
      sandboxd:
        condition: service_healthy
      crw:
        condition: service_healthy
      chrome-agent-sidecar:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  sandboxd:
    build: *oxide_app_build
    image: oxide-agent:latest
    container_name: oxide_agent_sandboxd
    restart: unless-stopped
    user: "0"
    command: ["./oxide-agent-sandboxd"]
    environment:
      - RUST_LOG=oxide_agent_core=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
      - STACK_LOGS_PROJECT=${COMPOSE_PROJECT_NAME:-oxide-agent}
    depends_on:
      sandbox_image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-run:/run/sandboxd
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sandboxd/sandboxd.sock"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crw:
    image: ${OXIDE_CRW_IMAGE:-ghcr.io/us/crw}
    container_name: crw
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
    ports:
      - "127.0.0.1:${OXIDE_CRW_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || curl -fsS http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  chrome-agent-sidecar:
    build: *browser_sidecar_build
    image: oxide-chrome-agent-sidecar:latest
    container_name: oxide_chrome_agent_sidecar
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - BROWSER_AGENT_SIDECAR_TOKEN=${BROWSER_AGENT_SIDECAR_TOKEN:-}
      - BROWSER_AGENT_ARTIFACT_DIR=/var/lib/oxide-browser/artifacts
      - BROWSER_AGENT_PROFILE_DIR=/tmp/oxide-browser-profiles
    ports:
      - "127.0.0.1:${BROWSER_AGENT_SIDECAR_PORT:-8787}:8787"
    volumes:
      - browser-artifacts:/var/lib/oxide-browser/artifacts
      - browser-profiles:/tmp/oxide-browser-profiles
    shm_size: "1gb"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8787/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  sandboxd-run:
  browser-artifacts:
  browser-profiles:
