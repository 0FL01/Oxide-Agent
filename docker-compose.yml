services:
  sandbox_image:
    profiles: ["build"]
    build:
      context: .
      dockerfile: sandbox/Dockerfile.sandbox
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}

  oxide_agent:
    build:
      context: .
    image: oxide-agent:latest
    container_name: oxide_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CRAWL4AI_URL=http://crawl4ai:11235
      - RUST_LOG=oxide_agent=info,zai_rs=warn,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - AGENT_MODE_ENABLED=${AGENT_MODE_ENABLED:-false}
      - WEB_OBSERVER_ENABLED=${WEB_OBSERVER_ENABLED:-false}
      - WEB_OBSERVER_BASE_URL=${WEB_OBSERVER_BASE_URL:-}
      - WEB_OBSERVER_BIND_ADDR=${WEB_OBSERVER_BIND_ADDR:-0.0.0.0:8080}
      - WEB_OBSERVER_TOKEN_TTL_SECS=${WEB_OBSERVER_TOKEN_TTL_SECS:-900}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - oxide_network
    depends_on:
      crawl4ai:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
    ports:
      - "8080:8080"
    # Web Task Observer (Stage 5) - Optional read-only task monitoring
    # When WEB_OBSERVER_ENABLED=true, users get "Watch Live" links in Telegram
    # Endpoints: /health, /api/observer/{token}/snapshot, /api/observer/{token}/events, /watch/{token}

  crawl4ai:
    image: unclecode/crawl4ai:0.8
    container_name: crawl4ai
    restart: unless-stopped
    networks:
      - oxide_network
    volumes:
      - /dev/shm:/dev/shm
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

networks:
  oxide_network:
    driver: bridge
