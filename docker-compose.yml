services:
  sandbox_image:
    profiles: ["build"]
    build:
      context: .
      dockerfile: sandbox/Dockerfile.sandbox
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    environment:
      - TZ=Europe/Moscow

  oxide_agent:
    build:
      context: .
    image: oxide-agent:latest
    container_name: oxide_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CRAWL4AI_URL=http://127.0.0.1:11235
      - TZ=Europe/Moscow
      - RUST_LOG=oxide_agent=info,zai_rs=warn,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOX_BACKEND=broker
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
    volumes:
      - ./config:/app/config
      - sandboxd-run:/run/sandboxd
    network_mode: host
    # depends_on:
    #   crawl4ai:
    #     condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  sandboxd:
    build:
      context: .
    image: oxide-agent:latest
    container_name: oxide_agent_sandboxd
    restart: unless-stopped
    user: "0"
    command: ["./oxide-agent-sandboxd"]
    environment:
      - RUST_LOG=oxide_agent_core=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-run:/run/sandboxd
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crawl4ai:
    image: unclecode/crawl4ai:0.8.5
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: '2gb'
    #volumes:
    #  - /dev/shm:/dev/shm
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  sandboxd-run:

