name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-web

services:
  oxide_web:
    environment:
      OXIDE_DATABASE_URL: ${OXIDE_DATABASE_URL:-postgres://oxide_agent:oxide_agent@127.0.0.1:55432/oxide_agent}
      SEARXNG_ENABLED: ${SEARXNG_ENABLED:-true}
      SEARXNG_URL: ${SEARXNG_URL:-http://127.0.0.1:8081}
      OXIDE_CRAWL4AI_BASE_URL: ${OXIDE_CRAWL4AI_BASE_URL:-http://127.0.0.1:11235}
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: oxide_agent_web_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OXIDE_POSTGRES_USER:-oxide_agent}
      POSTGRES_PASSWORD: ${OXIDE_POSTGRES_PASSWORD:-oxide_agent}
      POSTGRES_DB: ${OXIDE_POSTGRES_DB:-oxide_agent}
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:${OXIDE_POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  searxng:
    image: searxng/searxng:2026.5.31-300695de5
    container_name: searxng
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      SEARXNG_BASE_URL: http://127.0.0.1:8081/
      GRANIAN_HOST: 0.0.0.0
      GRANIAN_PORT: "8080"
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crawl4ai:
    image: unclecode/crawl4ai:0.8.7
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: "3g"
    environment:
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:11235:11235"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11235/health || wget -qO- http://localhost:11235/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"


