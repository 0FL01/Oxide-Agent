name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-web

services:
  oxide_web:
    environment:
      SEARXNG_ENABLED: ${SEARXNG_ENABLED:-true}
      SEARXNG_URL: ${SEARXNG_URL:-http://127.0.0.1:8081}
      SEARXNG_BEARER_TOKEN: ${SEARXNG_BEARER_TOKEN:-}
      OXIDE_CRAWL4AI_BASE_URL: ${OXIDE_CRAWL4AI_BASE_URL:-http://127.0.0.1:11235}
      OXIDE_CRAWL4AI_API_TOKEN: ${OXIDE_CRAWL4AI_API_TOKEN:-}
    depends_on:
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy

  searxng:
    image: searxng/searxng:2026.5.31-300695de5
    container_name: searxng
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      SEARXNG_BASE_URL: http://127.0.0.1:8081/
      GRANIAN_HOST: 0.0.0.0
      GRANIAN_PORT: "8080"
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crawl4ai:
    image: unclecode/crawl4ai:0.8.7
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: "3g"
    environment:
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:11235:11235"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11235/health || wget -qO- http://localhost:11235/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
