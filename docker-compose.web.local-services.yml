name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-web

services:
  oxide_web:
    environment:
      OXIDE_DATABASE_URL: ${OXIDE_DATABASE_URL:-postgres://oxide_agent:oxide_agent@127.0.0.1:55432/oxide_agent}
      OXIDE_CRW_ENABLED: ${OXIDE_CRW_ENABLED:-true}
      OXIDE_CRW_BASE_URL: ${OXIDE_CRW_BASE_URL:-http://127.0.0.1:3000}
      OXIDE_CRW_API_TOKEN: ${OXIDE_CRW_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      crw:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: oxide_agent_web_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OXIDE_POSTGRES_USER:-oxide_agent}
      POSTGRES_PASSWORD: ${OXIDE_POSTGRES_PASSWORD:-oxide_agent}
      POSTGRES_DB: ${OXIDE_POSTGRES_DB:-oxide_agent}
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:${OXIDE_POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  crw:
    image: ${OXIDE_CRW_IMAGE:-ghcr.io/us/crw}
    container_name: crw
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:${OXIDE_CRW_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || curl -fsS http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

