name: Docker Build & Push

on:
  push:
    branches:
      - testing
  workflow_dispatch:

env:
  IMAGE_NAME: oxide-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          build-args: |
            CARGO_FEATURES=oxide-agent-telegram-bot/profile-full,oxide-agent-sandboxd/profile-full
            PACKAGES=oxide-agent-telegram-bot oxide-agent-sandboxd
            BINARIES=oxide-agent-telegram-bot oxide-agent-sandboxd
            MCP_BINARIES=ssh-mcp jira-mcp mattermost-mcp
            ENTRYPOINT_BINARY=oxide-agent-telegram-bot
            RUNTIME_APT_PACKAGES=openssh-client
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
