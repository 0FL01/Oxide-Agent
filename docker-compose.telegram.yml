name: ${COMPOSE_PROJECT_NAME:-oxide-agent}-telegram

x-oxide-app-build: &oxide_app_build
  context: .
  dockerfile: docker/Dockerfile.app
  args:
    CARGO_FEATURES: oxide-agent-telegram-bot/profile-embedded-opencode-local,oxide-agent-sandboxd/profile-full
    PACKAGES: oxide-agent-telegram-bot oxide-agent-sandboxd
    BINARIES: oxide-agent-telegram-bot oxide-agent-sandboxd
    ENTRYPOINT_BINARY: oxide-agent-telegram-bot

services:
  sandbox_image:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.dev
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    command: ["true"]
    restart: "no"
    environment:
      - TZ=Europe/Moscow

  oxide_agent:
    build: *oxide_app_build
    image: oxide-agent:latest
    container_name: oxide_agent
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - SEARXNG_ENABLED=true
      - SEARXNG_URL=http://127.0.0.1:8081
      - TZ=Europe/Moscow
      - RUST_LOG=oxide_agent=info,zai_rs=warn,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn,async_openai=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOX_BACKEND=broker
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
    volumes:
      - ./config:/app/config
      - sandboxd-run:/run/sandboxd
    network_mode: host
    depends_on:
      sandboxd:
        condition: service_healthy
      searxng:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  sandboxd:
    build: *oxide_app_build
    image: oxide-agent:latest
    container_name: oxide_agent_sandboxd
    restart: unless-stopped
    user: "0"
    command: ["./oxide-agent-sandboxd"]
    environment:
      - RUST_LOG=oxide_agent_core=info,hyper=warn,h2=error,reqwest=warn,tokio=warn,tower=warn
      - DEBUG_MODE=false
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
      - SANDBOXD_SOCKET=/run/sandboxd/sandboxd.sock
      - STACK_LOGS_PROJECT=${COMPOSE_PROJECT_NAME:-oxide-agent}-telegram
    depends_on:
      sandbox_image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-run:/run/sandboxd
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sandboxd/sandboxd.sock"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  searxng:
    image: searxng/searxng:2026.3.24-054174a19
    container_name: searxng
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - SEARXNG_BASE_URL=http://127.0.0.1:8081/
      - GRANIAN_HOST=0.0.0.0
      - GRANIAN_PORT=8080
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  sandboxd-run:
